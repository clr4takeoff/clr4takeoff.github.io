<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b71b0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a5f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle for a premium feel -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.2"/>
  
  <!-- Airplane Path -->
  <path d="M20,70 L40,55 L85,25" stroke="#3b71b0" stroke-width="1.5" stroke-dasharray="4,2" fill="none" opacity="0.5" />
  
  <!-- Stylized Airplane Shape -->
  <path d="M75,25 L85,25 L80,35 Z" fill="#3b71b0" /> <!-- Nose/Tip -->
  <path d="M45,45 L85,25 L40,55 L45,65 Z" fill="url(#logoGrad)" /> <!-- Body -->
  <path d="M40,55 L30,75 L45,65 Z" fill="#3b71b0" /> <!-- Tail -->
  <path d="M60,37 L70,50 L55,40 Z" fill="#1a3a5f" /> <!-- Wing -->
  
  <!-- Speed lines -->
  <line x1="15" y1="75" x2="30" y2="65" stroke="#3b71b0" stroke-width="2" stroke-linecap="round" />
</svg>
